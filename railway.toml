[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Use Dockerfile HEALTHCHECK instead of Railway's
# healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Service configuration
numReplicas = 1

[deploy.env]
NODE_ENV = "production"
VAULT_VERSION = "1.0.0"
PORT = "8080"
