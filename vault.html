<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Dissident Token Vault</title>
    <link rel="stylesheet" href="css/vault.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body class="vault-page">
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-brand">
            <span class="logo-icon">🔐</span>
            <span class="brand-text">Dissident<span class="gradient">Vault</span></span>
            <span class="version">v2.0</span>
        </div>

        <div class="nav-actions">
            <div class="sync-status" id="syncStatus">
                <span class="status-dot online"></span>
                <span>Synced</span>
            </div>

            <button class="btn-icon" onclick="showSettings()" title="Settings">
                ⚙️
            </button>

            <button class="btn-icon" onclick="lockVault()" title="Lock">
                🔒
            </button>
        </div>
    </nav>

    <!-- Main Layout -->
    <div class="vault-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h3>Services</h3>
            </div>

            <div class="service-list" id="serviceList">
                <!-- Services loaded dynamically -->
            </div>

            <div class="sidebar-footer">
                <button class="btn-secondary btn-block" onclick="importTokens()">
                    📥 Import
                </button>

                <button class="btn-secondary btn-block" onclick="downloadConfig()">
                    📤 Export Config
                </button>
            </div>
        </aside>

        <!-- Content Area -->
        <main class="content">
            <div id="welcomeScreen" class="welcome-screen">
                <div class="welcome-card">
                    <div class="welcome-icon">🔐</div>
                    <h1>Welcome to Token Vault</h1>
                    <p>Select a service from the sidebar to manage its secrets</p>

                    <div class="features">
                        <div class="feature">
                            <span class="feature-icon">🔒</span>
                            <span>AES-256 Encryption</span>
                        </div>
                        <div class="feature">
                            <span class="feature-icon">🔄</span>
                            <span>GitHub Auto-Sync</span>
                        </div>
                        <div class="feature">
                            <span class="feature-icon">🚀</span>
                            <span>Railway Deployment</span>
                        </div>
                    </div>
                </div>
            </div>

            <div id="serviceContent" class="service-content hidden">
                <!-- Service content loaded dynamically -->
            </div>
        </main>
    </div>

    <!-- Toast Notifications -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal hidden">
        <div class="modal-overlay" onclick="closeModal('settingsModal')"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2>Settings</h2>
                <button class="btn-close" onclick="closeModal('settingsModal')">✕</button>
            </div>

            <div class="modal-body">
                <div class="setting-group">
                    <h3>GitHub Integration</h3>
                    <div class="form-group">
                        <label>GitHub Token</label>
                        <input type="password" id="githubToken" placeholder="ghp_xxxxxxxxxxxx">
                        <p class="help-text">For auto-sync of dissident-config.json</p>
                    </div>
                </div>

                <div class="setting-group">
                    <h3>Railway Integration</h3>
                    <div class="form-group">
                        <label>Railway Token</label>
                        <input type="password" id="railwayToken" placeholder="Enter Railway API token">
                    </div>

                    <div class="form-group">
                        <label class="checkbox">
                            <input type="checkbox" id="autoDeploy">
                            <span>Auto-deploy when variables change</span>
                        </label>
                    </div>
                </div>
            </div>

            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeModal('settingsModal')">Cancel</button>
                <button class="btn-primary" onclick="saveSettings()">Save Settings</button>
            </div>
        </div>
    </div>

    <script src="js/vault-core.js"></script>
    <script src="js/vault-ui.js"></script>
    <script>
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            if (!VaultCore.getSessionKey()) {
                window.location.href = 'login.html';
                return;
            }

            VaultUI.init();
        });

        function lockVault() {
            VaultCore.clearSession();
            window.location.href = 'login.html';
        }

        function showSettings() {
            const vaultData = VaultCore.loadVaultData();
            if (vaultData) {
                document.getElementById('githubToken').value = vaultData.githubToken || '';
                document.getElementById('railwayToken').value = vaultData.railwayToken || '';
                document.getElementById('autoDeploy').checked = vaultData.autoDeploy || false;
            }
            document.getElementById('settingsModal').classList.remove('hidden');
        }

        function saveSettings() {
            const vaultData = VaultCore.loadVaultData();
            if (vaultData) {
                vaultData.githubToken = document.getElementById('githubToken').value;
                vaultData.railwayToken = document.getElementById('railwayToken').value;
                vaultData.autoDeploy = document.getElementById('autoDeploy').checked;
                VaultCore.saveVaultData(vaultData);
            }
            closeModal('settingsModal');
            VaultUI.showToast('Settings saved', 'success');
        }

        function closeModal(id) {
            document.getElementById(id).classList.add('hidden');
        }
    </script>
</body>
</html>
