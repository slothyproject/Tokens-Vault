name: Deploy Token Vault to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway link --project resplendent-fulfillment --service dissident-tokens-vault --environment production
          railway up

      - name: Verify Deployment
        run: |
          sleep 10
          curl -s https://dissidenttokens.mastertibbles.co.uk || echo "Health check failed"
