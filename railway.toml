[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "nginx -g 'daemon off;'"
healthcheckPath = "/"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Service configuration
numReplicas = 1

[deploy.env]
NODE_ENV = "production"
VAULT_VERSION = "1.0.0"

# Optional: Custom domain (configure in Railway dashboard after first deploy)
# [[deploy.domains]]
# domain = "dissidenttokens.mastertibbles.co.uk"
# customDomain = true
